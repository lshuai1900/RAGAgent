# Ragent-Py main configuration.
# Override priority: environment variables > this file > code defaults.
# Environment variable naming: RAGENT__{SECTION}__{KEY}

app:
  host: 0.0.0.0
  port: 8000
  name: ragent-py
  env: dev

db:
  url: postgresql+asyncpg://ragent:ragent@localhost:5432/ragent
  pool_size: 10
  max_overflow: 20
  echo: false

milvus:
  uri: http://localhost:19530

llm:
  default_provider: qwen
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  api_key_ref: QWEN_API_KEY
  model: qwen-plus
  timeout: 60
  temperature: 0.0
  top_p: 1.0
  max_tokens: null

embedding:
  default_provider: qwen
  base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
  api_key_ref: QWEN_API_KEY
  model: text-embedding-v3
  dim: 1024
  batch_size: 10
  timeout: 60
  send_dimensions: false

rag:
  default_top_k: 10
